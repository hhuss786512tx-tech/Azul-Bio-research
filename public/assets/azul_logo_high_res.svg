<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="2000" height="600" fill="none">
  <defs>
    <linearGradient id="azulGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="50%" stop-color="#0072ff" />
      <stop offset="100%" stop-color="#003b95" />
    </linearGradient>
    <linearGradient id="azulGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5e5" />
      <stop offset="100%" stop-color="#008b9b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Logo Mark (Azul "B" DNA Helix Geometry) -->
  <g transform="translate(60, 50) scale(4.2)">
    <!-- Base Ribbon Path -->
    <path fill="url(#azulGrad1)" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
    
    <!-- DNA Strand Accent Nodes -->
    <circle cx="15" cy="10" r="2.5" fill="#ffffff" opacity="0.9" />
    <circle cx="35" cy="10" r="2.5" fill="#00e5e5" />
    <line x1="15" y1="10" x2="35" y2="10" stroke="#00e5e5" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.8" />

    <circle cx="20" cy="22" r="2.5" fill="#ffffff" opacity="0.9" />
    <circle cx="42" cy="22" r="2.5" fill="#00e5e5" />
    <line x1="20" y1="22" x2="42" y2="22" stroke="#00e5e5" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.8" />

    <circle cx="12" cy="34" r="2.5" fill="#ffffff" opacity="0.9" />
    <circle cx="30" cy="34" r="2.5" fill="#00e5e5" />
    <line x1="12" y1="34" x2="30" y2="34" stroke="#00e5e5" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.8" />
  </g>

  <!-- Brand Typography -->
  <!-- "azul" lowercase bold brand styling -->
  <text x="320" y="165" font-family="'Jost', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="110" fill="#0b192c" letter-spacing="-2">azul</text>
  
  <!-- "Bio-Research" -->
  <text x="540" y="165" font-family="'Jost', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="110" fill="#008b9b" letter-spacing="0">Bio-Research</text>
  
  <!-- Tagline -->
  <text x="325" y="215" font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="28" fill="#475569" letter-spacing="7">CLINICAL TRIALS NETWORK</text>
</svg>
